<svg width="100%" viewBox="0 0 680 1020" role="img" xmlns="http://www.w3.org/2000/svg">
<title>AuditPilot BPMN Flow Diagram</title>
<desc>End-to-end BPMN process flow for AuditPilot compliance automation system</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; fill: #444; }
    .arr { stroke: #555; stroke-width: 1.5; fill: none; }
    .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text   { fill: #085041; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text   { fill: #0C447C; }
    .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text  { fill: #712B13; }
    .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text  { fill: #633806; }
    .c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text   { fill: #444441; }
    .diamond       { fill: #fff; stroke: #888; stroke-width: 0.5; }
    .legend-label  { font-size: 11px; fill: #444; }
  </style>
</defs>

<!-- Title -->
<text class="th" x="340" y="30" text-anchor="middle" style="font-size:16px;fill:#1a1a1a;">AuditPilot — BPMN process flow</text>

<!-- START -->
<g class="c-teal">
  <rect x="270" y="50" width="140" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="72" text-anchor="middle" dominant-baseline="central">Monthly trigger</text>
</g>
<line x1="340" y1="94" x2="340" y2="118" class="arr" marker-end="url(#arrow)"/>

<!-- STEP 1: Orchestrator -->
<g class="c-purple">
  <rect x="210" y="118" width="260" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">Orchestrator agent</text>
  <text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">Reads config — tools, connections, template</text>
</g>
<line x1="340" y1="174" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>

<!-- Loop label -->
<text class="ts" x="340" y="214" text-anchor="middle">For each tool + connection</text>
<line x1="340" y1="218" x2="340" y2="230" class="arr" marker-end="url(#arrow)"/>

<!-- 3 RPA boxes -->
<g class="c-blue">
  <rect x="40" y="230" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="120" y="250" text-anchor="middle" dominant-baseline="central">Fivetran RPA</text>
  <text class="ts" x="120" y="268" text-anchor="middle" dominant-baseline="central">Users + teams screenshots</text>
</g>
<g class="c-blue">
  <rect x="260" y="230" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="250" text-anchor="middle" dominant-baseline="central">Snowflake RPA</text>
  <text class="ts" x="340" y="268" text-anchor="middle" dominant-baseline="central">Users + roles screenshots</text>
</g>
<g class="c-blue">
  <rect x="480" y="230" width="160" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="250" text-anchor="middle" dominant-baseline="central">GitHub RPA</text>
  <text class="ts" x="560" y="268" text-anchor="middle" dominant-baseline="central">Collaborators + teams</text>
</g>

<!-- Lines from orchestrator to RPA boxes -->
<line x1="280" y1="174" x2="120" y2="230" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="218" x2="340" y2="230" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="174" x2="560" y2="230" class="arr" marker-end="url(#arrow)"/>

<!-- Lines from RPA to AI Validation -->
<line x1="120" y1="286" x2="280" y2="360" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="286" x2="340" y2="360" class="arr" marker-end="url(#arrow)"/>
<line x1="560" y1="286" x2="400" y2="360" class="arr" marker-end="url(#arrow)"/>

<!-- STEP 3: AI Validation Agent -->
<g class="c-purple">
  <rect x="210" y="360" width="260" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="380" text-anchor="middle" dominant-baseline="central">AI validation agent</text>
  <text class="ts" x="340" y="398" text-anchor="middle" dominant-baseline="central">Blank check · anomaly detection · scoring</text>
</g>

<!-- Arize Phoenix side box -->
<g class="c-amber">
  <rect x="530" y="368" width="130" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="595" y="384" text-anchor="middle" dominant-baseline="central">Arize Phoenix</text>
  <text class="ts" x="595" y="400" text-anchor="middle" dominant-baseline="central">Traces every decision</text>
</g>
<line x1="470" y1="388" x2="530" y2="388" class="arr" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<line x1="340" y1="416" x2="340" y2="450" class="arr" marker-end="url(#arrow)"/>

<!-- Decision diamond -->
<polygon points="340,450 400,490 340,530 280,490" class="diamond"/>
<text class="ts" x="340" y="487" text-anchor="middle" dominant-baseline="central">Anomaly</text>
<text class="ts" x="340" y="502" text-anchor="middle" dominant-baseline="central">found?</text>

<!-- YES branch -->
<line x1="280" y1="490" x2="160" y2="490" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="218" y="482">YES</text>

<g class="c-coral">
  <rect x="40" y="462" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="100" y="482" text-anchor="middle" dominant-baseline="central">Maestro Case</text>
  <text class="ts" x="100" y="500" text-anchor="middle" dominant-baseline="central">Human review</text>
</g>

<line x1="100" y1="518" x2="100" y2="560" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
  <rect x="40" y="560" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="100" y="580" text-anchor="middle" dominant-baseline="central">Decision logged</text>
  <text class="ts" x="100" y="598" text-anchor="middle" dominant-baseline="central">Feedback to Arize</text>
</g>
<line x1="160" y1="590" x2="280" y2="640" class="arr" marker-end="url(#arrow)"/>

<!-- NO branch -->
<line x1="400" y1="490" x2="490" y2="490" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="436" y="482">NO</text>

<g class="c-teal">
  <rect x="490" y="462" width="120" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="550" y="482" text-anchor="middle" dominant-baseline="central">Auto-approved</text>
  <text class="ts" x="550" y="500" text-anchor="middle" dominant-baseline="central">Logged to Arize</text>
</g>
<line x1="550" y1="518" x2="400" y2="640" class="arr" marker-end="url(#arrow)"/>

<!-- STEP 5: Excel Agent -->
<g class="c-purple">
  <rect x="210" y="640" width="260" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="660" text-anchor="middle" dominant-baseline="central">Excel agent</text>
  <text class="ts" x="340" y="678" text-anchor="middle" dominant-baseline="central">Screenshots · AI summaries · highlights</text>
</g>
<line x1="340" y1="696" x2="340" y2="730" class="arr" marker-end="url(#arrow)"/>

<!-- STEP 6: Save + Archive -->
<g class="c-gray">
  <rect x="210" y="730" width="260" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="750" text-anchor="middle" dominant-baseline="central">Save + archive</text>
  <text class="ts" x="340" y="768" text-anchor="middle" dominant-baseline="central">Named with month + year</text>
</g>
<line x1="340" y1="786" x2="340" y2="820" class="arr" marker-end="url(#arrow)"/>

<!-- STEP 7: Email -->
<g class="c-gray">
  <rect x="210" y="820" width="260" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="840" text-anchor="middle" dominant-baseline="central">Email stakeholder</text>
  <text class="ts" x="340" y="858" text-anchor="middle" dominant-baseline="central">Report link + anomaly summary</text>
</g>
<line x1="340" y1="876" x2="340" y2="910" class="arr" marker-end="url(#arrow)"/>

<!-- END -->
<g class="c-teal">
  <rect x="270" y="910" width="140" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="932" text-anchor="middle" dominant-baseline="central">Done</text>
</g>

<!-- Legend -->
<rect x="40"  y="972" width="12" height="12" rx="2" style="fill:#E6F1FB;stroke:#185FA5;stroke-width:0.5"/>
<text class="legend-label" x="58"  y="982">RPA automation</text>
<rect x="160" y="972" width="12" height="12" rx="2" style="fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5"/>
<text class="legend-label" x="178" y="982">AI agent</text>
<rect x="250" y="972" width="12" height="12" rx="2" style="fill:#FAECE7;stroke:#993C1D;stroke-width:0.5"/>
<text class="legend-label" x="268" y="982">Human-in-loop</text>
<rect x="370" y="972" width="12" height="12" rx="2" style="fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5"/>
<text class="legend-label" x="388" y="982">Arize observability</text>
<rect x="510" y="972" width="12" height="12" rx="2" style="fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5"/>
<text class="legend-label" x="528" y="982">Output</text>

</svg>
